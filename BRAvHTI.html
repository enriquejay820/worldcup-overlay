<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    background: transparent;
    font-family: Arial, Helvetica, sans-serif;
}

.scoreboard {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: fit-content;
    background: rgba(0,0,0,.85);
    border: 2px solid rgba(255,255,255,.25);
    border-radius: 14px;
    padding: 8px 12px;
    color: white;
}

.team {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 22px;
    font-weight: 900;
    white-space: nowrap;
}

.flag {
    width: 34px;
    height: 24px;
    object-fit: cover;
    border-radius: 3px;
}

.score {
    font-size: 30px;
    font-weight: 900;
    background: white;
    color: #111;
    padding: 4px 13px;
    border-radius: 9px;
    min-width: 76px;
    text-align: center;
}
</style>
</head>

<body>

<div class="scoreboard">
    <div class="team">
        <img class="flag" src="https://upload.wikimedia.org/wikipedia/commons/0/05/Flag_of_Brazil.svg">
        BRA
    </div>

    <div class="score" id="score">0 - 0</div>

    <div class="team">
        HTI
        <img class="flag" src="https://upload.wikimedia.org/wikipedia/commons/5/56/Flag_of_Haiti.svg">
    </div>
</div>

<script>
const API_KEY = "123";
const EVENT_ID = "2391748";

const params = new URLSearchParams(window.location.search);

function setScore(home, away) {
    document.getElementById("score").textContent = `${home} - ${away}`;
}

function applyManualOverride() {
    const homeScore = params.get("homeScore");
    const awayScore = params.get("awayScore");

    if (homeScore !== null && awayScore !== null) {
        setScore(homeScore, awayScore);
        return true;
    }

    return false;
}

async function updateScore() {
    const manualMode = applyManualOverride();

    if (manualMode) return;

    try {
        const response = await fetch(
            `https://www.thesportsdb.com/api/v1/json/${API_KEY}/lookupevent.php?id=${EVENT_ID}&_=${Date.now()}`
        );

        const data = await response.json();

        if (!data.events || !data.events.length) return;

        const match = data.events[0];

        const home = match.intHomeScore;
        const away = match.intAwayScore;

        if (
            home !== null &&
            home !== undefined &&
            away !== null &&
            away !== undefined
        ) {
            setScore(home, away);
        }

    } catch (e) {
        console.log("Score update failed", e);
    }
}

updateScore();
setInterval(updateScore, 10000);
</script>

</body>
</html>
